services.detail.reparation-carrosserie-peinture.advantage1: "Restauration soignée de la carrosserie et de la peinture"
services.detail.reparation-carrosserie-peinture.advantage2: "Finitions durables, couleur parfaitement assortie"
services.detail.reparation-carrosserie-peinture.advantage3: "Travail réalisé dans nos ateliers à Baldersheim"
services.detail.reparation-carrosserie-peinture.placeholder: "Réparation de chocs, rayures et déformations. Peinture complète ou retouche selon les besoins. Nous utilisons des matériaux adaptés pour un rendu durable et une finition soignée."
services.detail.debosselage.advantage1: "Méthode sans peinture lorsque la tôle le permet"
services.detail.debosselage.advantage2: "Restauration de la forme d'origine"
services.detail.debosselage.advantage3: "Gain de temps et d'argent par rapport à une réparation classique"
services.detail.debosselage.placeholder: "Technique de débosselage qui préserve la peinture d'origine quand c'est possible. Idéal pour les petites bosses, les creux et les déformations légères. Résultat propre sans passage en peinture."
services.detail.pare-brise-optique.advantage1: "Remplacement rapide, souvent en une demi-journée"
services.detail.pare-brise-optique.advantage2: "Verre certifié et étanchéité garantie"
services.detail.pare-brise-optique.advantage3: "Optiques et phares : nettoyage, polish, remplacement"
services.detail.pare-brise-optique.placeholder: "Remplacement de pare-brise et vitrages. Verre certifié, pose soignée, garantie d'étanchéité. Nous intervenons aussi sur les optiques et phares : polish, correction de phares ternis, remplacement si nécessaire."
services.detail.entretien-mecanique.advantage1: "Contrôles rigoureux et conseils honnêtes"
services.detail.entretien-mecanique.advantage2: "Pièces d'origine ou équivalent qualité"
services.detail.entretien-mecanique.advantage3: "Révisions, freinage, pneumatiques"
services.detail.entretien-mecanique.placeholder: "Révision, entretien courant et petites réparations mécaniques. Nous contrôlons votre véhicule, vous conseillons et intervenons avec des pièces adaptées. Freinage, pneumatiques, niveaux : tout est vérifié."
services.detail.vehicule-pret-courtoisie.advantage1: "Mobilité assurée pendant les travaux"
services.detail.vehicule-pret-courtoisie.advantage2: "Sans frais supplémentaire selon les prestations"
services.detail.vehicule-pret-courtoisie.advantage3: "Véhicule propre et assuré"
services.detail.vehicule-pret-courtoisie.placeholder: "Lorsque votre véhicule doit rester en atelier, nous mettons à votre disposition un véhicule de prêt. Pratique, propre et assuré. Conditions selon la prestation — renseignez-vous lors du devis."
