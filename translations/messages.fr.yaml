qui_sommes_nous.title: "Qui sommes-nous ?"
qui_sommes_nous.alexis.role: "Carrossier"
qui_sommes_nous.alexis.lead: "À la tête de la Carrosserie Lino depuis 2022, Alexis Haffner perpétue l'excellence du garage avec une vision familiale et professionnelle."
qui_sommes_nous.alexis.text1: "Alexis travaille aux côtés de son père pour vous offrir un service de qualité. Une équipe familiale, des valeurs de confiance et de proximité : la Carrosserie Lino, c'est bien plus qu'un garage — c'est une histoire de famille au service de votre véhicule."
qui_sommes_nous.alexis.text2: "Réparation, peinture, débosselage : expertise et savoir-faire transmis de génération en génération pour vous garantir un travail soigné et des conseils honnêtes."
qui_sommes_nous.cta.quote: "Demander un devis"
