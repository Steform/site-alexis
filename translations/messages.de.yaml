qui_sommes_nous.title: "Über uns"
qui_sommes_nous.alexis.role: "Karosseriespengler"
qui_sommes_nous.alexis.lead: "Seit 2022 leitet Alexis Haffner die Carrosserie Lino und führt die Qualität des Betriebs mit einer familiären und professionellen Vision weiter."
qui_sommes_nous.alexis.text1: "Alexis arbeitet zusammen mit seinem Vater, um Ihnen einen hochwertigen Service zu bieten. Ein Familienbetrieb mit Werten wie Vertrauen und Nähe: Die Carrosserie Lino ist mehr als nur eine Werkstatt – sie ist eine Familiengeschichte im Dienst Ihres Fahrzeugs."
qui_sommes_nous.alexis.text2: "Reparatur, Lackierung, Ausbeulen: Fachwissen und Know-how, die von Generation zu Generation weitergegeben werden, um eine sorgfältige Arbeit und ehrliche Beratung zu garantieren."
qui_sommes_nous.cta.quote: "Offerte anfordern"
qui_sommes_nous.card.family.title: "Familienbetrieb"
qui_sommes_nous.card.family.text: "Alexis und sein Vater arbeiten gemeinsam, um Ihnen einen persönlichen und vertrauenswürdigen Service zu bieten."
qui_sommes_nous.card.expertise.title: "Karosserie-Expertise"
qui_sommes_nous.card.expertise.text: "Reparatur, Lackierung, Ausbeulen: anerkanntes Know-how für alle Fahrzeugtypen."
