services.why.title: "Warum uns wählen?"
services.why.how.title: "So funktioniert es"
services.why.how.text: "Kontaktieren Sie uns für eine Offerte oder einen Termin. Wir prüfen Ihr Fahrzeug, erstellen ein detailliertes Angebot und planen die Arbeit. Transparenz und ehrliche Beratung bei jedem Schritt."
