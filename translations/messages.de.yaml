services.detail.reparation-carrosserie-peinture.advantage1: "Sorgfältige Wiederherstellung von Karosserie und Lack"
services.detail.reparation-carrosserie-peinture.advantage2: "Langlebige Oberflächen, perfekt abgestimmte Farbe"
services.detail.reparation-carrosserie-peinture.advantage3: "Arbeit in unserer Werkstatt in Baldersheim"
services.detail.reparation-carrosserie-peinture.placeholder: "Reparatur von Unfallschäden, Kratzern und Verformungen. Vollständige Lackierung oder Retusche je nach Bedarf. Wir verwenden geeignete Materialien für ein dauerhaftes und gepflegtes Ergebnis."
services.detail.debosselage.advantage1: "Methode ohne Lackierung, wenn das Blech es zulässt"
services.detail.debosselage.advantage2: "Wiederherstellung der Originalform"
services.detail.debosselage.advantage3: "Zeit- und Kostenersparnis gegenüber klassischer Reparatur"
services.detail.debosselage.placeholder: "Beulenfrei-Technik, die den Originallack erhält, wenn möglich. Ideal für kleine Beulen, Dellen und leichte Verformungen. Sauberes Ergebnis ohne Lackarbeiten."
services.detail.pare-brise-optique.advantage1: "Schneller Austausch, oft in einem halben Tag"
services.detail.pare-brise-optique.advantage2: "Zertifiziertes Glas und Dichtheitsgarantie"
services.detail.pare-brise-optique.advantage3: "Scheinwerfer und Optik: Reinigung, Politur, Austausch"
services.detail.pare-brise-optique.placeholder: "Austausch von Windschutzscheibe und Verglasung. Zertifiziertes Glas, sorgfältige Montage, Dichtheitsgarantie. Wir kümmern uns auch um Scheinwerfer und Optik: Politur, Aufarbeitung getrübter Scheinwerfer, Austausch bei Bedarf."
services.detail.entretien-mecanique.advantage1: "Gründliche Kontrollen und ehrliche Beratung"
services.detail.entretien-mecanique.advantage2: "Originalteile oder gleichwertige Qualität"
services.detail.entretien-mecanique.advantage3: "Inspektion, Bremsen, Reifen"
services.detail.entretien-mecanique.placeholder: "Inspektion, laufende Wartung und kleine mechanische Reparaturen. Wir prüfen Ihr Fahrzeug, beraten Sie und arbeiten mit passenden Teilen. Bremsen, Reifen, Flüssigkeitsstände: alles wird kontrolliert."
services.detail.vehicule-pret-courtoisie.advantage1: "Mobilität während der Arbeiten gesichert"
services.detail.vehicule-pret-courtoisie.advantage2: "Ohne Aufpreis je nach Leistung"
services.detail.vehicule-pret-courtoisie.advantage3: "Sauberes und versichertes Fahrzeug"
services.detail.vehicule-pret-courtoisie.placeholder: "Wenn Ihr Fahrzeug in der Werkstatt bleiben muss, stellen wir Ihnen ein Ersatzfahrzeug zur Verfügung. Praktisch, sauber und versichert. Bedingungen je nach Leistung — fragen Sie bei der Offerte nach."
services.detail.placeholder_default: "Leistung in unserer Werkstatt in Baldersheim. Kontaktieren Sie uns für ein individuelles Angebot."

