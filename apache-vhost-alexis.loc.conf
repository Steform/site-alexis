<VirtualHost *:90>
    ServerName alexis.loc
    ServerAlias www.alexis.loc
    DocumentRoot /var/www/site-alexis/public

    <Directory /var/www/site-alexis/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/alexis.loc_error.log
    CustomLog ${APACHE_LOG_DIR}/alexis.loc_access.log combined
</VirtualHost>
